<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumo — Enhance Voice Context App</title>
    <meta name="description" content="Capture skills, workflows, and notes with your voice. Your AI-powered context assistant.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/context.css">

                        <div class="logo-bar logo-bar--tall"></div>

                        <span>Home</span>

                        </svg>
                        <span>Skills</span>
                    </a>
                    <a href="#" class="nav-link" data-page="notes">
                        <svg class="nav-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">

                            <path d="M12 12.75H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

                        <span class="context-card-dismiss">—</span>
                    </div>
                    <p class="context-card-desc">Capture skills, workflows, and notes with your voice.</p>
                    <button class="context-card-btn">Start recording</button>
                </div>

                <!-- Bottom actions -->
                <div class="sidebar-bottom">
                    <a href="#" class="bottom-link" id="nav-invite">

                            <path d="M6 5.25C7.65685 5.25 9 3.90685 9 2.25C9 0.593146 7.65685 -0.75 6 -0.75" stroke="currentColor" stroke-width="1.5" opacity="0"/>

        <main class="main-content" id="main-content">
            <!-- Pages will be rendered here -->

    <script src="js/router.js"></script>
    <script src="js/pages/home.js"></script>
    <script src="js/pages/context.js"></script>
    <script src="js/pages/workflows.js"></script>
    <script src="js/pages/skills.js"></script>
    <script src="js/pages/skill-builder.js"></script>
    <script src="js/pages/notes.js"></script>
    <script src="js/app.js"></script>

</html>
