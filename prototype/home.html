<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow Pro - Notes</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="light-theme">
    <div class="dashboard-container">
        <!-- Sidebar Navigation -->
        <aside class="dashboard-sidebar">
            <div class="sidebar-top">
                <div class="brand">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="brand-icon">
                        <rect x="2" y="10" width="4" height="10" rx="1" fill="currentColor"/>
                        <rect x="10" y="4" width="4" height="16" rx="1" fill="currentColor"/>
                        <rect x="18" y="14" width="4" height="6" rx="1" fill="currentColor"/>
                    </svg>
                    <span class="brand-name">Flow</span>
                    <span class="pro-badge">Pro</span>
                </div>
                
                <nav class="main-nav">
                    <a href="#" class="nav-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" class="nav-icon">
                            <rect x="3" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
                            <rect x="14" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
                            <rect x="14" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
                            <rect x="3" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
                        </svg>
                        Home
                    </a>
                    <a href="#" class="nav-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" class="nav-icon">
                            <path d="M4 19.5V4.5C4 3.67157 4.67157 3 5.5 3H15L19 7V19.5C19 20.3284 18.3284 21 17.5 21H5.5C4.67157 21 4 20.3284 4 19.5Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M14 3V7.5C14 8.05228 14.4477 8.5 15 8.5H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        Dictionary
                    </a>
                    <a href="#" class="nav-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" class="nav-icon">
                            <path d="M21 15L15 21M3 9L9 3M3 15C3 15 5.5 16.5 9 15C12.5 13.5 15 21 15 21C15 21 16.5 18.5 15 15C13.5 11.5 21 9 21 9C21 9 18.5 7.5 15 9C11.5 10.5 9 3 9 3C9 3 7.5 5.5 9 9C10.5 12.5 3 15 3 15Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        Snippets
                    </a>
                    <a href="#" class="nav-item active">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" class="nav-icon">
                            <path d="M19 4H5C3.89543 4 3 4.89543 3 6V20C3 21.1046 3.89543 22 5 22H19C20.1046 22 21 21.1046 21 20V6C21 4.89543 20.1046 4 19 4Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M7 8H17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M7 13H17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M7 18H13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        Notes
                    </a>
                </nav>

                <div class="upgrade-card">
                    <div class="upgrade-header">
                        <span class="upgrade-title">Bring your team to Flow 🚀</span>
                        <span class="upgrade-close">&mdash;</span>
                    </div>
                    <p class="upgrade-text">Add your team and get access to exclusive collaboration features.</p>
                    <button class="upgrade-btn">Add your team</button>
                </div>
            </div>

            <div class="sidebar-bottom">
                <nav class="secondary-nav">
                    <a href="#" class="nav-item">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="nav-icon">
                            <path d="M16 21V19C16 17.8954 15.1046 17 14 17H5C3.89543 17 3 17.8954 3 19V21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <circle cx="8.5" cy="7" r="4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M20 8V14M23 11H17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        Invite your team
                    </a>
                    <a href="#" class="nav-item">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="nav-icon">
                            <rect x="3" y="6" width="18" height="14" rx="2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M8 3V6M16 3V6M12 11V15M10 13H14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        Get a free month
                    </a>
                    <a href="#" class="nav-item">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="nav-icon">
                            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M19.4 15A1.65 1.65 0 0 0 19 16.5C18.6 17.1 18.5 17.8 18.8 18.4L18.8 18.5C19.1 19.3 18.9 20.2 18.2 20.6L16.5 21.6C15.8 22 14.9 21.8 14.5 21.1L14.4 21C14 20.4 13.4 20 12.7 20H11.3C10.6 20 10 20.4 9.6 21L9.5 21.1C9.1 21.8 8.2 22 7.5 21.6L5.8 20.6C5.1 20.2 4.9 19.3 5.2 18.5L5.2 18.4C5.5 17.8 5.4 17.1 5 16.5A1.65 1.65 0 0 0 4.6 15L4.5 14.8C3.8 14.3 3.5 13.4 3.9 12.6V11.4C4 10.6 4.6 9.7 5.3 9.2L5.4 9.2A1.65 1.65 0 0 0 6 7.5C6.4 6.9 6.5 6.2 6.2 5.6L6.2 5.5C5.9 4.7 6.1 3.8 6.8 3.4L8.5 2.4C9.2 2 10.1 2.2 10.5 2.9L10.6 3C11 3.6 11.6 4 12.3 4H13.7C14.4 4 15 3.6 15.4 3L15.5 2.9C15.9 2.2 16.8 2 17.5 2.4L19.2 3.4C19.9 3.8 20.1 4.7 19.8 5.5L19.8 5.6C19.5 6.2 19.6 6.9 20 7.5A1.65 1.65 0 0 0 20.4 9L20.5 9.2C21.2 9.7 21.5 10.6 21.1 11.4V12.6C21.1 13.4 20.4 14.3 19.7 14.8L19.4 15Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        Settings
                    </a>
                    <a href="#" class="nav-item">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="nav-icon">
                            <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M12 17V17.01M12 13.5C12 13.5 14 13 14 10.5C14 8.5 12 8 12 8C10.5 8 9.5 9 9.5 10.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        Help
                    </a>
                </nav>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="dashboard-main">
            <div class="content-wrapper">
                <header class="notes-header">
                    <h1>For quick thoughts you want to come back to</h1>
                </header>
                
                <div class="voice-input-container">
                    <div class="voice-input-box">
                        <input type="text" placeholder="Take a quick note with your voice" class="voice-textfield" disabled>
                        <button class="icon-btn voice-trigger">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 2C10.3431 2 9 3.34315 9 5V11C9 12.6569 10.3431 14 12 14C13.6569 14 15 12.6569 15 11V5C15 3.34315 13.6569 2 12 2Z" fill="white"/>
                                <path d="M19 10V11C19 14.866 15.866 18 12 18C8.13401 18 5 14.866 5 11V10" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M12 18V22M8 22H16" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="recents-section">
                    <div class="recents-header">
                        <h2>RECENTS</h2>
                        <div class="recents-controls">
                            <button class="icon-btn-ghost">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                                    <path d="M21 21L15 15M17 10C17 13.866 13.866 17 10 17C6.13401 17 3 13.866 3 10C3 6.13401 6.13401 3 10 3C13.866 3 17 6.13401 17 10Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </button>
                            <button class="icon-btn-ghost">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                                    <rect x="3" y="3" width="18" height="6" rx="1" stroke="currentColor" stroke-width="2"/>
                                    <rect x="3" y="15" width="18" height="6" rx="1" stroke="currentColor" stroke-width="2"/>
                                </svg>
                            </button>
                            <button class="icon-btn-ghost">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                                    <path d="M4 4V9H4.58152M19.9381 11C19.446 7.05369 16.0796 4 12 4C8.64262 4 5.76829 6.06817 4.58152 9M4.58152 9H9M20 20V15H19.4185M19.4185 15C18.2317 17.9318 15.3574 20 12 20C7.92038 20 4.55399 16.9463 5.04603 13M19.4185 15H15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="recents-list">
                        <div class="empty-state">No notes found</div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
